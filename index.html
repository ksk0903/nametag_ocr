<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>연수생 명찰 구분 도구</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<style>
  :root{
    --bg:#0f1520; --panel:#161f2e; --panel2:#1d2a3d; --line:#26364d;
    --text:#e8eef7; --muted:#8ba0bd; --accent:#3d8bff; --accent2:#20c997;
    --warn:#ffb020; --danger:#ff5d5d; --chip:#22314a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Malgun Gothic','맑은 고딕',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5; padding-bottom:40px;
  }
  header.top{
    position:sticky; top:0; z-index:40; background:rgba(15,21,32,.96);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .brand{display:flex; flex-direction:column; margin-right:auto}
  .brand b{font-size:17px; letter-spacing:-.3px}
  .brand span{font-size:12px; color:var(--muted)}
  .btn{
    border:1px solid var(--line); background:var(--panel2); color:var(--text);
    padding:9px 15px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; transition:.12s; white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent); background:#24344c}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .btn.primary:hover{background:#2f7cf0}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 11px; font-size:13px}
  .wrap{max-width:1100px; margin:0 auto; padding:16px}
  .stats{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 16px}
  .stat b{font-size:20px} .stat span{color:var(--muted); font-size:12px; display:block}
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center}
  select,input[type=text]{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:10px; font-size:14px; min-width:150px; font-family:inherit;
  }
  .hint{font-size:12px; color:var(--muted)}
  .kbd{background:var(--chip); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-size:12px}
  .classblock{background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-bottom:16px; overflow:hidden}
  .classhead{padding:12px 16px; background:var(--panel2); display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-bottom:1px solid var(--line)}
  .rbadge{background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px}
  .classhead .cn{font-weight:700; letter-spacing:-.3px}
  .classhead .cnt{color:var(--muted); font-size:12px; margin-left:auto}
  table{width:100%; border-collapse:collapse; font-size:14px}
  th,td{padding:8px 12px; text-align:left; border-bottom:1px solid #1e2a3d}
  th{color:var(--muted); font-weight:600; font-size:12px; background:#131c2a; position:sticky}
  tr:last-child td{border-bottom:none}
  td.nm{font-weight:700}
  .jochip{display:inline-block; background:var(--chip); border:1px solid var(--line); border-radius:6px; padding:1px 8px; font-size:12px; font-weight:600}
  mark{background:var(--warn); color:#1a1a1a; border-radius:3px; padding:0 2px}

  /* ---- OCR modal ---- */
  .overlay{position:fixed; inset:0; z-index:100; background:rgba(6,10,16,.85); display:none}
  .overlay.on{display:flex; flex-direction:column}
  .ocrbar{padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); background:var(--bg)}
  .ocrbar b{margin-right:auto}
  .stage{position:relative; flex:0 0 auto; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden}
  #video{width:100%; max-height:62vh; object-fit:cover; display:block}
  .guide{position:absolute; border:3px solid var(--accent2); border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,.35); pointer-events:none}
  .scanline{position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent2),transparent); animation:scan 2s linear infinite}
  @keyframes scan{0%{top:0}100%{top:100%}}
  .ocrstatus{position:absolute; bottom:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.7); padding:6px 14px; border-radius:20px; font-size:13px; color:#cfe0f7}
  .loglist{flex:1; overflow-y:auto; background:var(--bg); padding:10px 14px}
  .logtitle{font-size:12px; color:var(--muted); margin:4px 2px 8px; display:flex; align-items:center; gap:8px}
  .logrow{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px}
  .logrow.dupe{opacity:.6}
  .logrow .who{display:flex; flex-direction:column; min-width:0}
  .logrow .who b{font-size:15px}
  .logrow .who small{color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .logrow .tags{margin-left:auto; text-align:right; display:flex; flex-direction:column; gap:3px; align-items:flex-end}
  .tag-r{background:var(--accent); color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:14px}
  .tag-jo{background:var(--accent2); color:#04150f; font-size:13px; font-weight:800; padding:2px 10px; border-radius:8px}
  .tag-cls{font-size:11px; color:var(--muted); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .emptylog{color:var(--muted); text-align:center; padding:26px 10px; font-size:14px}

  /* ---- big popup ---- */
  .popup{position:fixed; z-index:200; left:50%; top:38%; transform:translate(-50%,-50%) scale(.7); opacity:0;
    background:linear-gradient(160deg,#1c2b45,#12203a); border:2px solid var(--accent2);
    border-radius:22px; padding:22px 34px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.6);
    transition:transform .18s cubic-bezier(.2,1.4,.5,1), opacity .18s; pointer-events:none; min-width:230px}
  .popup.show{opacity:1; transform:translate(-50%,-50%) scale(1)}
  .popup.warn{border-color:var(--warn)}
  .popup .pname{font-size:26px; font-weight:800; margin-bottom:2px}
  .popup .pschool{font-size:13px; color:var(--muted); margin-bottom:14px}
  .popup .pbig{font-size:44px; font-weight:900; color:var(--accent2); line-height:1.1}
  .popup .prow{font-size:15px; margin-top:6px}
  .popup .prow .l{color:var(--muted); margin-right:6px}
  .popup .pcls{font-size:13px; color:#cfe0f7; margin-top:8px; word-break:keep-all}
  .popup .rbadge2{display:inline-block; background:var(--accent); color:#fff; font-weight:700; font-size:13px; padding:3px 12px; border-radius:20px; margin-bottom:10px}

  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22314a; border:1px solid var(--line); color:var(--text); padding:11px 18px; border-radius:12px; z-index:300; font-size:14px; opacity:0; transition:.2s; pointer-events:none}
  .toast.show{opacity:1}
  .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:640px){
    .stat{padding:8px 12px} .stat b{font-size:17px}
    th.hidem,td.hidem{display:none}
    .tag-cls{max-width:130px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="brand"><b>연수생 명찰 구분 도구</b><span>수원컨벤션센터 · 명찰 OCR 자동 인식</span></div>
  <button class="btn primary" id="ocrBtn">📷 OCR 시작</button>
  <button class="btn" id="importBtn">📁 엑셀 불러오기</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="filters">
    <select id="fRound"><option value="">전체 회차</option></select>
    <select id="fClass"><option value="">전체 클래스</option></select>
    <input type="text" id="fQuick" placeholder="빠른 필터 (이름·학교)">
    <span class="hint">검색은 <span class="kbd">Ctrl</span>+<span class="kbd">F</span> 로도 됩니다</span>
  </div>

  <div id="roster"></div>
</div>

<!-- OCR overlay -->
<div class="overlay" id="overlay">
  <div class="ocrbar">
    <b>명찰 OCR 인식</b>
    <button class="btn sm" id="switchCam" title="카메라 전환">🔄 전환</button>
    <button class="btn sm primary" id="stopOcr">■ OCR 중지</button>
  </div>
  <div class="stage" id="stage">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide" id="guide"><div class="scanline"></div></div>
    <div class="ocrstatus" id="ocrstatus">준비 중…</div>
  </div>
  <div class="loglist">
    <div class="logtitle"><span id="logCount">인식 0건</span> · 최근 인식이 위에 표시됩니다
      <button class="btn sm ghost" id="clearLog" style="margin-left:auto">기록 지우기</button>
    </div>
    <div id="logbody"><div class="emptylog">명찰을 초록 박스 안에 비추면<br>이름·소속을 인식해 회차·클래스·조를 알려드립니다.</div></div>
  </div>
</div>

<div class="popup" id="popup"></div>
<div class="toast" id="toast"></div>

/* ============ util ============ */
const $=s=>document.querySelector(s);
const norm=t=>(t||'').replace(/[\s\u200b]+/g,'').replace(/[^0-9A-Za-z가-힣]/g,'');
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

/* ============ render roster ============ */
function groupByClass(list){
  const map=new Map();
  for(const p of list){ if(!map.has(p.full)) map.set(p.full,[]); map.get(p.full).push(p); }
  return map;
}
function buildFilters(){
  const rounds=[...new Set(PEOPLE.map(p=>p.round).filter(Boolean))];
  const fr=$('#fRound'); fr.innerHTML='<option value="">전체 회차</option>'+rounds.map(r=>`<option>${esc(r)}</option>`).join('');
  refreshClassFilter();
}
function refreshClassFilter(){
  const r=$('#fRound').value;
  const classes=[...new Set(PEOPLE.filter(p=>!r||p.round===r).map(p=>p.full))];
  $('#fClass').innerHTML='<option value="">전체 클래스</option>'+classes.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
function renderStats(){
  const cl=new Set(PEOPLE.map(p=>p.full)).size;
  const rd=new Set(PEOPLE.map(p=>p.round).filter(Boolean)).size;

    <div class="stat"><b>${PEOPLE.length}</b><span>총 연수생</span></div>
    <div class="stat"><b>${cl}</b><span>클래스(분반)</span></div>
    <div class="stat"><b>${rd}</b><span>회차</span></div>`;
}
function renderRoster(){
  const r=$('#fRound').value, c=$('#fClass').value, q=norm($('#fQuick').value);
  let list=PEOPLE.filter(p=>(!r||p.round===r)&&(!c||p.full===c));
  if(q) list=list.filter(p=>norm(p.name).includes(q)||norm(p.school).includes(q));
  const map=groupByClass(list);
  let html='';
  if(map.size===0) html='<div class="emptylog" style="padding:40px">조건에 맞는 연수생이 없습니다.</div>';
  for(const [full,rows] of map){
    const round=rows[0].round;
    html+=`<div class="classblock"><div class="classhead">
      ${round?`<span class="rbadge">${esc(round)}</span>`:''}
      <span class="cn">${esc(full)}</span>
      <span class="cnt">${rows.length}명</span></div>
      <table><thead><tr><th>조</th><th>No</th><th>소속(학교)</th><th>성명</th><th class="hidem">담당교과</th><th class="hidem">비고</th></tr></thead><tbody>`;
    for(const p of rows){
      html+=`<tr><td><span class="jochip">${esc(p.jo)}</span></td><td>${esc(p.no)}</td><td>${esc(p.school)}</td><td class="nm">${esc(p.name)}</td><td class="hidem">${esc(p.subj)}</td><td class="hidem">${esc(p.note)}</td></tr>`;
    }
    html+='</tbody></table></div>';
  }
  $('#roster').innerHTML=html;
}
function renderAll(){renderStats();buildFilters();renderRoster();}

$('#fRound').addEventListener('change',()=>{refreshClassFilter();renderRoster();});
$('#fClass').addEventListener('change',renderRoster);
$('#fQuick').addEventListener('input',renderRoster);

/* ============ Excel import ============ */
$('#importBtn').addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const parsed=parseRows(aoa);
    if(parsed.length===0){toast('명단을 인식하지 못했습니다. 양식을 확인하세요.');return;}
    PEOPLE=parsed; renderAll();
    toast(`엑셀 불러오기 완료 · ${PEOPLE.length}명`);
  }catch(err){console.error(err);toast('엑셀 읽기 오류: '+err.message);}
  e.target.value='';
});
// same parsing logic as source file: header rows contain "총 N명, N개조"
function parseRows(aoa){
  const clean=x=>(x==null?'':String(x)).trim();
  const out=[]; let curFull='',curRound='',curCls='';
  for(const row of aoa){
    const a=clean(row[0]);
    if(!a) continue;
    if(a.includes('총')&&a.includes('개조')){
      const title=a.split('(총')[0].trim(); curFull=title;
      const m=title.match(/^(\d+\s*회차)/);
      curRound=m?m[1].replace(/\s/g,''):'';
      let cls=title; if(m) cls=title.slice(m[0].length);
      curCls=cls.replace(/^[_\s]+/,'').trim();
      continue;
    }
    if(a==='조') continue;
    if(/^\d+조$/.test(a)){
      const name=clean(row[3]);
      if(name) out.push({round:curRound,cls:curCls,full:curFull,jo:a,no:clean(row[1]),school:clean(row[2]),name,subj:clean(row[4]),gender:clean(row[5]),note:clean(row[6])});
    }
  }
  return out;
}

/* ============ matching ============ */
// returns {list:[person...], confident:bool} or null
function matchTag(ocrText){
  const t=norm(ocrText);
  if(t.length<2) return null;
  const cand=PEOPLE.filter(p=>{const n=norm(p.name); return n.length>=2 && t.includes(n);});
  if(cand.length===0) return fuzzyMatch(t);
  const withSchool=cand.filter(p=>{const s=norm(p.school); return s.length>=2 && t.includes(s);});
  if(withSchool.length===1) return {list:withSchool,confident:true};
  if(withSchool.length>1)  return {list:withSchool,confident:false};
  if(cand.length===1)      return {list:cand,confident:false};
  return {list:cand,confident:false};
}
function keyOf(p){return p.name+'|'+p.school+'|'+p.jo+'|'+p.full;}

// --- fuzzy fallback: tolerates 1-2 OCR misreadings in the name ---
function lev(a,b){
  const m=a.length,n=b.length;
  if(m===0) return n; if(n===0) return m;
  let prev=new Array(n+1); for(let j=0;j<=n;j++) prev[j]=j;
  for(let i=1;i<=m;i++){
    const cur=[i];
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    prev=cur;
  }
  return prev[n];
}
function bestWindowScore(hay,needle){
  if(!needle) return 0;
  let best=0;
  const nl=needle.length;
  for(let len=Math.max(1,nl-1); len<=nl+1; len++){
    for(let i=0;i+len<=hay.length; i++){
      const sub=hay.substr(i,len);
      const d=lev(sub,needle);
      const sc=1-d/Math.max(sub.length,nl);
      if(sc>best) best=sc;
    }
  }
  return best;
}
function fuzzyMatch(t){
  if(t.length<2) return null;
  let best=null, bestScore=0;
  for(const p of PEOPLE){
    const n=norm(p.name);
    if(n.length<2) continue;
    const scoreName=bestWindowScore(t,n);
    if(scoreName<0.6) continue; // name must be at least ~60% matched
    const s=norm(p.school);
    const scoreSchool=s.length>=2?bestWindowScore(t,s):0;
    const score=scoreName+scoreSchool*0.4;
    if(score>bestScore){bestScore=score;best=p;}
  }
  if(!best) return null;
  return {list:[best],confident:false,fuzzy:true};
}

/* ============ OCR camera ============ */
let stream=null, worker=null, scanning=false, facing='environment';
const seenAt={}; // cooldown
let logCount=0;

$('#ocrBtn').addEventListener('click',startOCR);
$('#stopOcr').addEventListener('click',stopOCR);
$('#switchCam').addEventListener('click',async()=>{facing=facing==='environment'?'user':'environment';await openCamera();});
$('#clearLog').addEventListener('click',()=>{$('#logbody').innerHTML='<div class="emptylog">기록이 지워졌습니다. 다시 명찰을 비춰주세요.</div>';logCount=0;updLogCount();for(const k in seenAt)delete seenAt[k];});

async function startOCR(){
  $('#overlay').classList.add('on');
  setStatus('카메라 준비 중…');
  try{ await openCamera(); }catch(e){ setStatus('카메라 접근 실패'); toast('카메라를 열 수 없습니다: '+e.message); return; }
  if(!worker){
    setStatus('한글 인식 엔진 로딩 중… (최초 1회, 수십초 소요)');
    try{
      worker=await Tesseract.createWorker('kor+eng');
      // name tags are a small block of short lines, not a full page —
      // this mode + these params make recognition both faster and more accurate
      await worker.setParameters({
        tessedit_pageseg_mode:'6',        // assume a single uniform block of text
        preserve_interword_spaces:'1',
        tessedit_ocr_engine_mode:'1'      // LSTM only (skip slower legacy engine)
      });
    }catch(e){ setStatus('엔진 로딩 실패'); toast('OCR 엔진 로딩 실패 (인터넷 연결 확인)'); return; }
  }
  positionGuide();
  scanning=true;
  setStatus('명찰을 초록 박스 안에 비춰주세요');
  scanLoop();
}
async function openCamera(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},audio:false});
  const v=$('#video'); v.srcObject=stream; await v.play().catch(()=>{});
  setTimeout(positionGuide,300);
}
function positionGuide(){
  const v=$('#video'), g=$('#guide');
  const vw=v.clientWidth, vh=v.clientHeight;
  const gw=Math.min(vw*0.85,640), gh=Math.min(vh*0.5,320);
  g.style.width=gw+'px'; g.style.height=gh+'px';
  g.style.left=(vw-gw)/2+'px'; g.style.top=(vh-gh)/2+'px';
}
window.addEventListener('resize',()=>{ if($('#overlay').classList.contains('on')) positionGuide(); });

function grabFrame(){
  const v=$('#video');
  if(!v.videoWidth) return null;
  const g=$('#guide'), vrect=v.getBoundingClientRect(), grect=g.getBoundingClientRect();
  const sx=(grect.left-vrect.left)/vrect.width*v.videoWidth;
  const sy=(grect.top-vrect.top)/vrect.height*v.videoHeight;
  const sw=grect.width/vrect.width*v.videoWidth;
  const sh=grect.height/vrect.height*v.videoHeight;
  if(sw<10||sh<10) return null;
  // cap output width regardless of guide box size — this is what keeps recognize() fast
  const TARGET_W=760;
  const scale=Math.max(1, Math.min(TARGET_W/sw, 2.2));
  const c=document.createElement('canvas');
  c.width=Math.round(sw*scale); c.height=Math.round(sh*scale);
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(v,sx,sy,sw,sh,0,0,c.width,c.height);
  const img=ctx.getImageData(0,0,c.width,c.height), d=img.data;
  // grayscale + auto contrast stretch (adapts to actual lighting instead of a fixed threshold)
  const n=d.length/4; let lo=255,hi=0;
  const gray=new Uint8ClampedArray(n);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    const y=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    gray[j]=y; if(y<lo)lo=y; if(y>hi)hi=y;
  }
  const range=Math.max(20,hi-lo); // guard against near-flat frames
  for(let i=0,j=0;i<d.length;i+=4,j++){
    let y=(gray[j]-lo)/range*255;
    y=Math.pow(Math.max(0,Math.min(255,y))/255,0.85)*255; // mild gamma to pop dark text
    d[i]=d[i+1]=d[i+2]=y;
  }
  ctx.putImageData(img,0,0);
  return c;
}
async function scanLoop(){
  while(scanning){
    const c=grabFrame();
    if(c && worker){
      try{
        const {data}=await worker.recognize(c);
        handleOCR(data.text||'');
      }catch(e){ /* ignore frame */ }
    }
    // recognize() itself takes ~0.3-1.5s; a short extra gap is enough to avoid pegging the CPU
    await new Promise(r=>setTimeout(r,250));
  }
}
let busyPopup=false;
function handleOCR(text){
  if(!scanning) return;
  const m=matchTag(text);
  if(!m){ setStatus('인식 중… 명찰을 박스 안에 또렷하게'); return; }
  const p=m.list[0]; const k=keyOf(p); const now=Date.now();
  if(m.list.length>1){
    // ambiguous: show once per cooldown
    if(seenAt['AMB|'+k] && now-seenAt['AMB|'+k]<5000) return;
    seenAt['AMB|'+k]=now;
    showPopupAmbiguous(m.list);
    m.list.forEach(pp=>addLog(pp,true));
    return;
  }
  if(seenAt[k] && now-seenAt[k]<4000){ setStatus('인식됨: '+p.name); return; }
  seenAt[k]=now;
  showPopup(p,m.confident,m.fuzzy);
  addLog(p,false);
}
function setStatus(s){ $('#ocrstatus').innerHTML=s; }

/* popup */
function showPopup(p,confident,fuzzy){
  const el=$('#popup');
  el.className='popup'+(confident?'':' warn');
  let note='';
  if(fuzzy) note='※ 글자가 흐릿하게 인식됨 · 유사 매칭 결과이니 확인해 주세요';
  else if(!confident) note='※ 소속 미확인 · 이름만 일치';
  el.innerHTML=`
    ${p.round?`<div class="rbadge2">${esc(p.round)}</div>`:''}
    <div class="pname">${esc(p.name)}</div>
    <div class="pschool">${esc(p.school)}${p.subj?' · '+esc(p.subj):''}</div>
    <div class="pbig">${esc(p.jo)}</div>
    <div class="pcls">${esc(p.cls||p.full)}</div>
    ${note?`<div class="prow" style="color:var(--warn);font-size:12px;margin-top:8px">${note}</div>`:''}`;
  requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1000); // 1초 유지
}
function showPopupAmbiguous(list){
  const el=$('#popup'); el.className='popup warn';
  el.innerHTML=`<div class="rbadge2" style="background:var(--warn);color:#1a1a1a">동명이인 ${list.length}명</div>
    <div class="pname" style="font-size:20px">${esc(list[0].name)}</div>
    <div class="pschool">소속으로 직접 확인하세요</div>
    ${list.map(p=>`<div class="prow"><span class="jochip">${esc(p.jo)}</span> ${esc(p.school)} <span style="color:var(--muted)">· ${esc(p.round||'')}</span></div>`).join('')}`;
  requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1500);
}

/* log */
function addLog(p,dupe){
  const body=$('#logbody');
  if(body.querySelector('.emptylog')) body.innerHTML='';
  const div=document.createElement('div');
  div.className='logrow'+(dupe?' dupe':'');
  div.innerHTML=`<div class="who"><b>${esc(p.name)}</b><small>${esc(p.school)}${p.subj?' · '+esc(p.subj):''}</small></div>
    <div class="tags">
      ${p.round?`<span class="tag-r">${esc(p.round)}</span>`:''}
      <span class="tag-jo">${esc(p.jo)}</span>
      <span class="tag-cls">${esc(p.cls||p.full)}</span>
    </div>`;
  body.insertBefore(div,body.firstChild);
  logCount++; updLogCount();
}
function updLogCount(){ $('#logCount').textContent='인식 '+logCount+'건'; }

function stopOCR(){
  scanning=false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  $('#video').srcObject=null;
  $('#overlay').classList.remove('on');
  $('#popup').classList.remove('show');
}

/* init */
renderAll();
</script>
